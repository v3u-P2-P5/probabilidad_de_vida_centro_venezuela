# ============================================================================
#  Configuración — Información post-terremoto Venezuela 2026 (Caracas / La Guaira)
#  APP INFORMATIVA. Solo datos reales y atribuidos. NO localiza personas atrapadas.
#  Editable EN CALIENTE (la app recarga sin reiniciar código).
# ============================================================================

# --- Modo ---
# operativo=true  => SOLO datos reales (USGS, OSM, ReliefWeb, GDACS). Si una capa
#                    no está disponible se marca NO DISPONIBLE; NUNCA se inventan datos.
modo_operativo: true

# --- Auto-refresco (tiempo real) ---
autorefresco_segundos: 120      # la app se actualiza sola cada N segundos
shakemap_ttl_segundos: 300      # relee ShakeMap de USGS cada N segundos
osm_ttl_segundos: 1800          # relee recursos OSM cada N segundos

# --- Secuencia sísmica REAL (USGS) — SISMO DOBLE ---
# Dos eventos en 38 segundos, epicentros separados ~5.5 km. Se combinan sus
# ShakeMaps tomando la MMI máxima celda a celda (envolvente de sacudimiento).
sismo:
  usgs_event_id: "us6000t7zp"       # M7.5 principal (28 km SE Yumare, 22:05:11Z)
  usgs_event_ids:                    # Secuencia completa para combinar ShakeMaps
    - "us6000t7zp"                   # M7.5 · lon=-68.472 · lat=10.435 · 22:05:11Z
    - "us6000t7zc"                   # M7.2 · lon=-68.528 · lat=10.436 · 22:04:33Z
  usar_datos_reales: true
  # Valores de respaldo (se sobrescriben con USGS en vivo):
  origen_iso: "2026-06-24T22:05:11Z"   # 18:05 VET — hora de referencia para decaimiento
  magnitud: 7.5
  profundidad_km: 10
  epicentro: { lat: 10.4351, lon: -68.4716 }

# --- Datos de impacto en tiempo real (ReliefWeb / GDACS) ---
# Cifras oficiales de fallecidos/heridos/desaparecidos/daños provienen de
# reportes de situación (OCHA/UNICEF) y se muestran SIEMPRE con fuente y hora.
relief:
  reliefweb_disaster: "eq-2026-000093-ven"   # ReliefWeb disaster id (OCHA)
  # appname de ReliefWeb v2: DEBE ser aprobado (gratis) en
  # https://apidoc.reliefweb.int/parameters#appname — al ponerlo aquí, el feed
  # de cifras oficiales aparece automáticamente. Vacío => solo enlace al desastre.
  appname: ""
  gdacs_eventid: 1548377                       # GDACS event id (alerta roja)
  gdacs_episodeid: 1714328
  ttl_segundos: 600                            # refrescar cifras cada 10 min

# --- Cifras oficiales (preliminares, citadas) ---
# Las cifras de víctimas/desaparecidos varían por fuente y evolucionan. Se
# publican SIEMPRE atribuidas (fuente + fecha + enlace). Editar a medida que
# las fuentes oficiales actualicen. Campos opcionales: fallecidos/heridos/
# desaparecidos (texto), notas.
cifras_oficiales:
  - fuente: "Cifras oficiales consolidadas (ABC News / Wikipedia)"
    fecha: "2026-06-28"
    url: "https://abcnews.com/International/live-updates/venezuela-earthquakes-updates/?id=134196335"
    fallecidos: "1.430"
    heridos: ">3.200"
    desaparecidos: "~50.000"
  - fuente: "Jorge Rodríguez — Asamblea Nacional Venezuela"
    fecha: "2026-06-26"
    url: "https://es.wikipedia.org/wiki/Terremotos_de_Venezuela_de_2026"
    fallecidos: "920"
    heridos: "3.360"
  - fuente: "Vicepresidenta Delcy Rodríguez (vía Al Jazeera)"
    fecha: "2026-06-25"
    url: "https://www.aljazeera.com/news/liveblog/2026/6/25/venezuela-earthquakes-live-at-least-188-dead-as-rescue-efforts-intensify"
    fallecidos: "235"
    heridos: "~4.300"
    notas: "Cifra preliminar primeras 24 h."
  - fuente: "Gobierno de Venezuela (Presidencia, vía ONU Noticias)"
    fecha: "2026-06-25"
    url: "https://news.un.org/en/story/2026/06/1167806"
    fallecidos: "164"
    heridos: "971"
    notas: "Primer parte oficial."
  - fuente: "USGS PAGER (estimación por modelo)"
    fecha: "2026-06-24"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zp/pager"
    notas: "Alerta ROJA — 44% de probabilidad de más de 10.000 fallecidos (modelo, no recuento)."

# Daños materiales reportados (atribuidos)
danos_materiales:
  - texto: "~58.870 edificios dañados o destruidos (estimación por análisis satelital)."
    fuente: "ABC News / análisis satelital"
    fecha: "2026-06-28"
    url: "https://abcnews.com/International/live-updates/venezuela-earthquakes-updates/?id=134196335"
  - texto: "Edificios colapsados en Caracas y La Guaira; mayor afectación en el litoral central. Aeropuerto de Maiquetía cerrado."
    fuente: "CNN / Al Jazeera"
    fecha: "2026-06-25"
    url: "https://www.cnn.com/2026/06/24/weather/live-news/venezuela-earthquake-puerto-rico-tsunami"
  - texto: "Cartografía de daño en elaboración (edificios potencialmente dañados)."
    fuente: "Copernicus EMS EMSR884 / UNOSAT"
    fecha: "2026-06-26"
    url: "https://mapping.emergency.copernicus.eu/news/earthquake-in-venezuela-emsr884/"

# --- Personas desaparecidas ---
# No existe una lista pública certificada de nombres (la gestión es confidencial
# vía CICR/Cruz Roja). Esta lista queda EDITABLE para casos publicados por fuentes
# oficiales/familiares con su consentimiento. Campos: nombre, edad, zona,
# visto_por_ultima_vez, contacto, foto_url (opcional), fuente, url, fecha.
desaparecidos: []

# --- Ground-failure USGS (peligro real por ubicación) ---
# Rásters de probabilidad de licuefacción (Zhu 2017) y deslizamiento (Jessee 2018)
# del evento M7.5. Se muestrean por celda en scripts/precompute_population.py.
ground_failure:
  liquefaction_tif_url: "https://earthquake.usgs.gov/product/ground-failure/6000t7zp/us/1782505459442/zhu_2017_general_model.tif"
  landslide_tif_url: "https://earthquake.usgs.gov/product/ground-failure/6000t7zp/us/1782505459442/jessee_2018_model.tif"

rejilla:
  tamano_celda_m: 150

# --- Población real ---
poblacion:
  raster_path: "data/raw/ven_ppp_2020_constrained.tif"   # WorldPop VEN 100m
  worldpop_tif_url: "https://data.worldpop.org/GIS/Population/Global_2000_2020/2020/VEN/ven_ppp_2020.tif"
  # Fuente: WorldPop Hub API confirmada (ID=6448, dataset vpgp año 2020, 477 MB)
  # Lectura remota NO disponible (servidor WorldPop no soporta HTTP range requests).
  # Para activar la capa: ejecutar scripts/download_population.py (477 MB, una vez).
  usar_api_remota: false   # API REST WorldPop por bloques: lenta (~30s/zona) bajo
                           # carga. OFF → usa censo INE (instantáneo) si no hay TIF.

# --- Fuentes de datos: enlaces OFICIALES exactos (se citan en la app) ---
fuentes:
  usgs_evento:
    nombre: "USGS — Evento principal M7.5 (us6000t7zp)"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zp/executive"
  usgs_evento_secundario:
    nombre: "USGS — Evento secundario M7.2 (us6000t7zc)"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zc/executive"
  usgs_shakemap:
    nombre: "USGS ShakeMap — Intensidad combinada (MMI max entre ambos eventos)"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zp/shakemap/intensity"
  usgs_shakemap_secundario:
    nombre: "USGS ShakeMap M7.2"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zc/shakemap/intensity"
  usgs_pager:
    nombre: "USGS PAGER — Víctimas y pérdidas estimadas"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zp/pager"
  usgs_ground_failure:
    nombre: "USGS — Deslizamientos y licuefacción"
    url: "https://earthquake.usgs.gov/earthquakes/eventpage/us6000t7zp/ground-failure"
  copernicus_emsr884:
    nombre: "Copernicus EMS — EMSR884 (cartografía de daño, Venezuela)"
    url: "https://mapping.emergency.copernicus.eu/news/earthquake-in-venezuela-emsr884/"
  unosat:
    nombre: "UNOSAT — Edificios potencialmente dañados (UNITAR)"
    url: "https://unosat.org/products/"
  reliefweb:
    nombre: "ReliefWeb (OCHA) — Reportes de situación Venezuela"
    url: "https://reliefweb.int/disaster/eq-2026-000093-ven"
  gdacs:
    nombre: "GDACS — Alerta y estimación de impacto"
    url: "https://www.gdacs.org/report.aspx?eventid=1548377&episodeid=1714328&eventtype=EQ"
  icrc_rfl:
    nombre: "CICR — Restablecimiento del Contacto entre Familiares (buscar/registrar)"
    url: "https://familylinks.icrc.org/"
  icrc_trace_face:
    nombre: "CICR — Trace the Face (búsqueda con fotos)"
    url: "https://tracetheface.familylinks.icrc.org/"
  cruz_roja_venezolana:
    nombre: "Cruz Roja Venezolana — Ayuda y reunificación familiar"
    url: "https://cruzroja.ve/"
  caritas_venezuela:
    nombre: "Cáritas Venezuela — Ayuda y donaciones (ONG)"
    url: "https://caritasvenezuela.org/"
  desaparecidos_terremoto_ve:
    nombre: "Desaparecidos Terremoto Venezuela — «Reconectemos a cada familia»"
    url: "https://desaparecidosterremotovenezuela.com/"
  maxar_open_data:
    nombre: "Maxar/Vantor Open Data — Imágenes pre/post evento"
    url: "https://www.maxar.com/open-data"
  worldpop:
    nombre: "WorldPop — Población Venezuela 100m (CC-BY 4.0)"
    url: "https://data.humdata.org/dataset/worldpop-population-density-for-venezuela-bolivarian-republic-of"
  osm:
    nombre: "OpenStreetMap — Hospitales, bomberos, refugios (© colaboradores OSM)"
    url: "https://www.openstreetmap.org/copyright"
    overpass: "https://overpass-api.de/api/interpreter"

# --- Zonas (una página por zona). bbox = [lon_min, lat_min, lon_max, lat_max] ---
zonas:
  - id: libertador
    nombre: "Caracas — Libertador"
    # Ampliado al oeste y sur para cubrir Caricuao, Antímano, Coche y El Valle
    # (antes se cortaban: bbox empezaba en -66.95 / 10.480).
    bbox: [-67.00, 10.440, -66.870, 10.520]
    # Densidad poblacional: INE Venezuela Censo 2011 — Municipio Libertador (~2,094,000 hab, ~76 km²)
    densidad_hab_km2: 19000
  - id: sucre_petare
    nombre: "Caracas — Sucre / Petare"
    bbox: [-66.835, 10.470, -66.770, 10.515]
    # Municipio Sucre (~573,000 hab, ~40 km²) — zona alta densidad informal
    densidad_hab_km2: 14400
  - id: baruta_hatillo
    nombre: "Caracas — Baruta / El Hatillo / Chacao"
    # Ampliado al norte (10.480 → 10.510) para incluir Chacao/Chacaíto, que antes
    # quedaba en el hueco entre Libertador y Sucre (sin cobertura).
    bbox: [-66.885, 10.400, -66.800, 10.510]
    # Municipios Baruta + El Hatillo + Chacao (~600,000 hab, ~76 km²)
    densidad_hab_km2: 7800
  - id: la_guaira
    nombre: "La Guaira — Litoral"
    # Ampliado al este (-66.850 → -66.730) para cubrir Macuto, Caraballeda,
    # Tanaguarena y Naiguatá, que antes quedaban fuera del litoral mostrado.
    bbox: [-66.950, 10.580, -66.730, 10.625]
    # Estado Vargas / La Guaira (~352,000 hab, ~74 km² zona costera)
    densidad_hab_km2: 4800
