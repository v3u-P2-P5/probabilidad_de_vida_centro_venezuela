name: Mantener la app despierta (Streamlit Cloud)

# Streamlit Community Cloud "duerme" las apps del plan gratuito tras un
# período sin visitas. Este workflow visita la URL cada 20 min desde los
# servidores de GitHub (gratis en repos públicos), sin depender de ningún
# equipo encendido.
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visitar la app
        run: |
          curl -sSL --max-time 30 -o /dev/null -w "HTTP %{http_code}\n" \
            "https://providavenezuela.streamlit.app/"
