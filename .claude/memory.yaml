# --- MEMORIA SEMÁNTICA (hechos y decisiones estables) ----------------------
semantica:
  decisiones:
    - id: D1
      decision: "Stack = Python 3 + Streamlit (multipágina, una página por zona)."
      razon: "Cumple 'local en un puerto + fácil de publicar'; multipágina nativa evita un mapa único pesado."
      importancia: 5
    - id: D2
      decision: "Google Maps NO se usa como fuente de imágenes."
      razon: "ToS prohíbe descarga masiva; requiere facturación; óptico (inútil de noche/nubes)."
      importancia: 5
    - id: D3
      decision: "Fuentes gratuitas: USGS (sacudimiento) + Copernicus EMS/Maxar (daño) + Meta/WorldPop+OSM (población) + reportes de campo (tiempo real)."
      importancia: 5
    - id: D4
      decision: "P_vida = sacudimiento × colapso × poblacion_presente(hora) × supervivencia × decaimiento(72h) + boost_reportes."
      razon: "La probabilidad de sobrevivientes se modela; el satélite solo aporta la capa de daño con latencia."
      importancia: 5
    - id: D5
      decision: "La hora es crítica: a las 11:45 laborable la población está en trabajo/escuela/comercio, no en casa."
      importancia: 4
    - id: D6
      decision: "Modo operativo = SOLO datos reales; capa faltante => NO DISPONIBLE, nunca datos inventados."
      razon: "Mostrar cifras falsas como reales en una emergencia cuesta vidas."
      importancia: 5
    - id: D7
      decision: "MMI real desde ShakeMap grid.xml (malla regular, interpolación bilineal). En operativo NO se usa la IPE sintética."
      importancia: 5
    - id: D8
      decision: "En operativo NO se modela vulnerabilidad/colapso por edificio (no hay inventario estructural abierto). Score = sacudimiento × población × decaimiento + reportes."
      razon: "El colapso por tipo de edificio era sintético; en real solo se usan capas medibles."
      importancia: 4
    - id: D9
      decision: "Overpass exige User-Agent descriptivo (sin él: HTTP 406). Usar reintentos + espejos."
      importancia: 4
    - id: D10
      decision: "Toda métrica cita su fuente con enlace oficial exacto y hora de obtención (VET/UTC ISO)."
      importancia: 4
  hechos:
    - "Zonas iniciales: Libertador, Sucre/Petare, Baruta-Hatillo-Chacao, La Guaira-Litoral."
    - "La Guaira fue zona del desastre de deslaves de 1999 => alta vulnerabilidad."
    - "Ventana de las 72 horas de oro para rescate con vida."
    - "Latencia satelital: óptico depende de nubes; Sentinel-1 ~6-12 días; ARIA DPM 1-2 semanas."

# --- MEMORIA PROCEDIMENTAL (cómo hacer las cosas) --------------------------
procedimental:
  entorno:
    - "El proyecto vive en WSL (Ubuntu): ~/work_space_linux/probabilidad_de_vida"
    - "Ejecutar comandos vía: wsl bash -lc \"cd ~/work_space_linux/probabilidad_de_vida && <cmd>\""
  comandos:
    crear_venv: "python3 -m venv venv"
    activar_venv: "source venv/bin/activate"
    instalar: "./venv/bin/python -m pip install -r requirements.txt"
    correr_app: "./venv/bin/python -m streamlit run app.py"
    correr_tests: "./venv/bin/python -m pytest -q"
    url_local: "http://localhost:8501"
  recetas:
    actualizar_evento: "Editar config.yaml -> sismo (origen_iso, magnitud, epicentro, usgs_event_id)."
    ajustar_modelo: "Editar config.yaml -> pesos. Recarga en caliente sin tocar código."
    desplegar: "Push a GitHub -> conectar repo en share.streamlit.io (Community Cloud)."

# --- ÍNDICE DE ARCHIVOS CLAVE (mapa mental del repo) -----------------------
indice_archivos:
  "config.yaml": "Zonas, pesos, evento USGS, fuentes con enlaces, modo_operativo, auto-refresco. Editable en caliente."
  "core/scoring.py": "Modelo P_vida (función pura, testeable)."
  "core/shakemap.py": "Descarga+parseo de grid.xml de USGS e interpolación bilineal de MMI real."
  "core/data_sources.py": "Cliente USGS: evento+PAGER+ground-failure. synthetic_mmi solo demo."
  "core/osm.py": "Overpass: recursos críticos reales (User-Agent + reintentos/espejos)."
  "core/population.py": "Ráster WorldPop (rasterio, lazy) + sintético solo demo."
  "core/sources.py": "Procedencia y tiempo VET/UTC (fmt_vet_utc, layer())."
  "core/pipeline.py": "Ensamble operativo (real) vs demo; devuelve (df, ctx con procedencia)."
  "core/ui.py": "apply_chrome (idioma+auto-refresco), render_sources, mapa con recursos, banderas NO DISPONIBLE."
  "scripts/download_population.py": "Descarga WorldPop VEN 100m."
  "app.py": "Inicio: evento real, PAGER, ground-failure, reloj 72h, resumen, fuentes."
  "pages/": "Una página por zona + reportes de campo."
  "data/field_reports.csv": "Reportes de campo en vivo (boost del modelo)."
